<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #fff;
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .label { font-size: 13px; color: #ccc; }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider { background: #4f8ef7; }
    input:checked + .slider::before { transform: translateX(18px); }

    .status {
      font-size: 11px;
      color: #888;
      margin-top: 10px;
      text-align: center;
    }

    .hint {
      font-size: 11px;
      color: #666;
      margin-top: 8px;
      text-align: center;
    }

    .hint strong {
      color: #999;
    }
  </style>
</head>
<body>
  <h1>Better Pivot</h1>
  <div class="row">
    <span class="label">Column Resizing</span>
    <label class="toggle">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="status" id="status"></div>
  <div class="hint">Press <strong>Ctrl+Shift+R</strong> after changing settings</div>
  <script src="popup.js"></script>
</body>
</html>
